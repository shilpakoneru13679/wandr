<h2>Where are you going?</h2>

<form action="/generate" method="post">
    <input name="city" placeholder="Destination" required>
    
    <input name="length" placeholder="How many days?" required>

    <input name="budget" placeholder="Budget (low/medium/high)" required>
    
    <input name="vibe" placeholder="Describe your vibe" required>

    <input name="interests" placeholder="Interests" required>

    <input name="theme" placeholder="One word (e.g. calm, luxe)" required>

    <button type="submit">Generate ✨</button>
</form>
